<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Nexus | Secure Registration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <header class="auth-header">
            <div class="logo">AETHER NEXUS</div>
            <h1>Vanguard of Identity</h1>
            <p>Phase 1: Ethereal Perimeter Integration</p>
            <a href="../project1/index.html" class="back-link">← Back to Command Center</a>
        </header>

        <main class="auth-card">
            <form id="registration-form" novalidate>
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="name" placeholder="Enter architectural name" 
                           required minlength="3" aria-describedby="name-error" aria-invalid="false">
                    <span class="error-message" id="name-error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="email">Security Email</label>
                    <input type="email" id="email" name="email" placeholder="email@aethernexus.com" 
                           required aria-describedby="email-error" aria-invalid="false">
                    <span class="error-message" id="email-error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="password">Access Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" 
                           required aria-describedby="password-error" aria-invalid="false">
                    <div class="password-meter" aria-hidden="true">
                        <div class="meter-bar"></div>
                    </div>
                    <span class="error-message" id="password-error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Access</label>
                    <input type="password" id="confirm-password" name="confirm" placeholder="••••••••" 
                           required aria-describedby="confirm-error" aria-invalid="false">
                    <span class="error-message" id="confirm-error" aria-live="polite"></span>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-text">Execute Registration</span>
                    <div class="btn-loader"></div>
                </button>
            </form>
            <div id="success-state" class="hidden" role="alert" aria-live="assertive">
                <div class="success-icon">✓</div>
                <h2>Registration Approved</h2>
                <p>Identity persisted to the Neural Core.</p>
                <button onclick="location.reload()" class="btn-secondary">New Entry</button>
            </div>
        </main>

        <footer class="auth-footer">
            <p>&copy; 2025 Aether Nexus | Strategic Infrastructure</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
